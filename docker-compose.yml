version: "3.9"

services:
  agent:
    build:
      context: ./cooking-agent
      dockerfile: Dockerfile
    container_name: cooking-agent
    ports:
      - "${AGENT_PORT:-9000}:9000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - PORT=9000
      - NODE_ENV=production
    volumes:
      - agent_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build:
      context: ./cooking-app
      dockerfile: Dockerfile
    container_name: cooking-app
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agent_data: